<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fam - Family Organiser</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;background:#FAF8F5}
    #splash{position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;background:#FAF8F5;z-index:9999}
    .fam-logo{font-size:56px;font-weight:900;color:#E8734A;letter-spacing:-3px;font-family:Georgia,serif}
    .fam-msg{font-size:14px;color:#8A8478;font-family:Georgia,serif;margin-top:8px}
  </style>
</head>
<body>
  <div id="splash">
    <div class="fam-logo">Fam</div>
    <div class="fam-msg" id="fam-status">Starting up...</div>
  </div>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    function famErr(m){var e=document.getElementById("fam-status");if(e){e.style.color="#C94F4F";e.textContent=m;}}
    window.onerror=function(m,s,l){famErr("Error line "+l+": "+m);return true;};
    window.onunhandledrejection=function(e){famErr("Error: "+(e.reason&&e.reason.message?e.reason.message:String(e.reason)));};
  </script>
  <script src="https://cdn.jsdelivr.net/gh/mantuaborges/fam-app@main/app-part1.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/mantuaborges/fam-app@main/app-part2.js"></script>
</body>
</html>
