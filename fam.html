<!DOCTYPE html>
<!-- Fam v2.4 stable -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Fam - Family Organiser</title>
  <link rel="manifest" href="/fam-app/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Fam">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#E8734A">
  <meta name="application-name" content="Fam">
  <meta name="description" content="Your family, organised together.">
  <style>
    /* ===== DESIGN TOKENS (added) ===== */
    :root {
      /* — type — */
      --font-display: "Newsreader", Georgia, serif;
      --font-ui: "Geist", ui-sans-serif, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;

      /* — spacing (4pt) — */
      --s-1:2px; --s-2:4px; --s-3:8px; --s-4:12px; --s-5:16px;
      --s-6:20px; --s-7:24px; --s-8:32px; --s-9:40px; --s-10:48px;
      --s-11:64px; --s-12:80px;

      /* — radii — */
      --r-xs:4px; --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:20px; --r-pill:999px;

      /* — light palette — */
      --bg-canvas:#f6f3ec; --bg-surface:#fdfbf6; --bg-raised:#ffffff;
      --bg-sunken:#efeae0; --bg-hover:#efeadd;   --bg-active:#e8e1d1;
      --border-subtle:#ece5d4; --border:#ddd4be; --border-strong:#c7bea6;
      --ink-1:#1f1b16; --ink-2:#5d5448; --ink-3:#8b8270; --ink-4:#b7ad99;

      --clay:#b9613f; --clay-2:#a8543a; --clay-tint:#f4e3d7;
  /* --- Foundation tokens (for fam-components.css) --- */
  --hit: 40px;
  --topbar-h: 56px;
  --sidebar-w: 232px;
  --ink-on-accent: #ffffff;
  --bg-scrim: rgba(0,0,0,0.42);
  --sage-tint:  color-mix(in oklab, var(--sage)  14%, var(--bg-surface));
  --sky-tint:   color-mix(in oklab, var(--sky)   14%, var(--bg-surface));
  --rose-tint:  color-mix(in oklab, var(--rose)  14%, var(--bg-surface));
  --amber-tint: color-mix(in oklab, var(--amber) 14%, var(--bg-surface));
  --plum-tint:  color-mix(in oklab, var(--plum)  14%, var(--bg-surface));
  --danger-bg:  color-mix(in oklab, var(--danger)  12%, var(--bg-surface));
  --warning-bg: color-mix(in oklab, var(--warning) 12%, var(--bg-surface));
  --success-bg: color-mix(in oklab, var(--success) 12%, var(--bg-surface));
  --info-bg:    color-mix(in oklab, var(--info)    12%, var(--bg-surface));

      --sage:#6c8d63; --sky:#5d89b1; --rose:#c07e8b; --amber:#c89745; --plum:#8a6691;

      --danger:#b9483a; --warning:#b88732; --success:#5e8455; --info:#4f7ba3;

      /* — elevation — */
      --sh-xs: 0 1px 2px rgba(31,27,22,.05);
      --sh-sm: 0 1px 2px rgba(31,27,22,.04), 0 2px 6px rgba(31,27,22,.05);
      --sh-md: 0 2px 6px rgba(31,27,22,.04), 0 10px 24px rgba(31,27,22,.08);
      --sh-lg: 0 4px 10px rgba(31,27,22,.06), 0 30px 60px rgba(31,27,22,.14);
      --ring: 0 0 0 3px rgba(185,97,63,.28);
    }
    @media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg-canvas:#15120e; --bg-surface:#1c1814; --bg-raised:#251f19;
    --bg-sunken:#110e0a; --bg-hover:#221d17; --bg-active:#2c261f;
    --bg-scrim:rgba(0,0,0,0.6);
    --border-subtle:#2a241c; --border:#3a3327; --border-strong:#524937;
    --ink-1:#f3ece0; --ink-2:#b6ad9c; --ink-3:#837a6a; --ink-4:#5b5448;
    --clay:#d97a55; --clay-2:#c66b48; --clay-tint:#3a221a;
    --sage:#88a87f; --sage-tint:#1e2a1c;
    --sky:#7da4c8;  --sky-tint:#1a242e;
    --rose:#d599a3; --rose-tint:#2e1f23;
    --amber:#dcab57; --amber-tint:#2c2316;
    --plum:#a884ad; --plum-tint:#261c29;
    --danger:#d76452; --danger-bg:#341d18;
    --warning:#d6a44b; --warning-bg:#2d2415;
    --success:#84a878; --success-bg:#1e271c;
    --info:#75a0c8; --info-bg:#1a2530;
    --sh-xs:0 1px 2px rgba(0,0,0,0.4);
    --sh-sm:0 1px 2px rgba(0,0,0,0.3),0 2px 6px rgba(0,0,0,0.4);
    --sh-md:0 2px 6px rgba(0,0,0,0.3),0 10px 24px rgba(0,0,0,0.45);
    --sh-lg:0 4px 10px rgba(0,0,0,0.4),0 30px 60px rgba(0,0,0,0.55);
    --ring:0 0 0 3px rgba(217,122,85,0.32);
  }
}
[data-theme="dark"] {
  --bg-canvas:#15120e; --bg-surface:#1c1814; --bg-raised:#251f19;
  --bg-sunken:#110e0a; --bg-hover:#221d17; --bg-active:#2c261f;
  --bg-scrim:rgba(0,0,0,0.6);
  --border-subtle:#2a241c; --border:#3a3327; --border-strong:#524937;
  --ink-1:#f3ece0; --ink-2:#b6ad9c; --ink-3:#837a6a; --ink-4:#5b5448;
  --clay:#d97a55; --clay-2:#c66b48; --clay-tint:#3a221a;
  --sage:#88a87f; --sage-tint:#1e2a1c;
  --sky:#7da4c8;  --sky-tint:#1a242e;
  --rose:#d599a3; --rose-tint:#2e1f23;
  --amber:#dcab57; --amber-tint:#2c2316;
  --plum:#a884ad; --plum-tint:#261c29;
  --danger:#d76452; --danger-bg:#341d18;
  --warning:#d6a44b; --warning-bg:#2d2415;
  --success:#84a878; --success-bg:#1e271c;
  --info:#75a0c8; --info-bg:#1a2530;
  --sh-xs:0 1px 2px rgba(0,0,0,0.4);
  --sh-sm:0 1px 2px rgba(0,0,0,0.3),0 2px 6px rgba(0,0,0,0.4);
  --sh-md:0 2px 6px rgba(0,0,0,0.3),0 10px 24px rgba(0,0,0,0.45);
  --sh-lg:0 4px 10px rgba(0,0,0,0.4),0 30px 60px rgba(0,0,0,0.55);
  --ring:0 0 0 3px rgba(217,122,85,0.32);
}
    /* ===== END DESIGN TOKENS ===== */
    /* ===== SETTINGS COMPONENTS (added) ===== */
    .settings-shell { display: grid; gap: var(--s-6); grid-template-columns: 220px 1fr; }
    .settings-rail { display: flex; flex-direction: column; gap: 2px; position: sticky; top: var(--s-3);
      background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--r-lg);
      padding: var(--s-3); height: fit-content; }
    .settings-rail-item { display: flex; align-items: center; gap: var(--s-3);
      padding: var(--s-3) var(--s-4); border-radius: var(--r-md); cursor: pointer;
      font: 500 14px/1 var(--font-ui); color: var(--ink-2); border: none;
      background: transparent; text-align: left; width: 100%;
      transition: background .15s, color .15s; }
    .settings-rail-item:hover { background: var(--bg-hover); color: var(--ink-1); }
    .settings-rail-item.active { background: var(--bg-active); color: var(--ink-1); font-weight: 600; }
    .settings-rail-item .ic { width: 18px; height: 18px; flex-shrink: 0; opacity: .85; display: inline-flex; }
    .settings-body { min-width: 0; display: flex; flex-direction: column; gap: var(--s-5); }
    .fam-card { background: var(--bg-surface); border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg); overflow: hidden; }
    .fam-card-head { padding: var(--s-5) var(--s-7) var(--s-4);
      border-bottom: 1px solid var(--border-subtle); }
    .fam-card-head h2 { margin: 0; font: 600 16px/1.3 var(--font-ui); color: var(--ink-1); }
    .fam-card-head .caption { font: 400 13px/1.4 var(--font-ui); color: var(--ink-3); margin-top: 4px; }
    .setting-row { display: grid; grid-template-columns: 1fr auto; gap: var(--s-5);
      align-items: center; padding: var(--s-5) var(--s-7); }
    .setting-row + .setting-row { border-top: 1px solid var(--border-subtle); }
    .setting-row .label { font: 500 14px/1.4 var(--font-ui); color: var(--ink-1); margin: 0; }
    .setting-row .hint { font: 400 13px/1.4 var(--font-ui); color: var(--ink-3); margin-top: 2px; }
    .setting-row .control { justify-self: end; }
    @media (max-width: 720px) {
      .settings-shell { grid-template-columns: 1fr; }
      .settings-rail { position: static; flex-direction: row; overflow-x: auto;
        padding: var(--s-2); gap: var(--s-2); }
      .settings-rail-item { flex-shrink: 0; }
      .setting-row { grid-template-columns: 1fr; gap: var(--s-3); padding: var(--s-4) var(--s-5); }
      .setting-row .control { justify-self: start; }
    }
    /* ===== END SETTINGS COMPONENTS ===== */
    /* ===== SIDEBAR + NAV + QUICKADD MODAL (added) ===== */
    .fam-sidebar { width: 232px; flex-shrink: 0; border-right: 1px solid var(--border-subtle);
      background: var(--bg-canvas); padding: var(--s-4) var(--s-3); display: flex;
      flex-direction: column; gap: var(--s-4); position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .fam-brand { display: flex; align-items: baseline; justify-content: space-between;
      padding: var(--s-2) var(--s-3); }
    .fam-brand .word { font: 500 26px/1 var(--font-display); color: var(--clay); letter-spacing: -0.01em; }
    .fam-brand .fam-name { font: 500 12px/1 var(--font-ui); color: var(--ink-3); }
    .fam-search { display: flex; align-items: center; gap: var(--s-3);
      padding: 8px var(--s-3); border: 1px solid var(--border-subtle);
      border-radius: var(--r-md); background: var(--bg-surface); cursor: pointer;
      color: var(--ink-3); font: 400 13px/1 var(--font-ui); width: 100%; text-align: left; }
    .fam-search:hover { border-color: var(--border); }
    .fam-search .ic { width: 16px; height: 16px; flex-shrink: 0; opacity: .7; }
    .fam-search .kbd { font: 500 10px/1 var(--font-mono); background: var(--bg-active);
      border: 1px solid var(--border-subtle); border-radius: 4px; padding: 2px 6px;
      color: var(--ink-3); margin-left: auto; }
    .fam-btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: var(--s-2);
      width: 100%; min-height: 40px; padding: 0 var(--s-4); border: none;
      background: var(--clay); color: #fff; font: 600 14px/1 var(--font-ui);
      border-radius: var(--r-md); cursor: pointer; box-shadow: var(--sh-xs);
      transition: background .12s; }
    .fam-btn-primary:hover { background: var(--clay-2); }
    .fam-btn-primary .ic { width: 16px; height: 16px; }
    .nav-group { display: flex; flex-direction: column; gap: 1px; }
    .nav-section { display: flex; align-items: center; justify-content: space-between;
      padding: var(--s-4) var(--s-3) var(--s-2); }
    .nav-section .label { font: 600 11px/1.3 var(--font-ui); letter-spacing: .1em;
      text-transform: uppercase; color: var(--ink-3); }
    .fam-nav-item { display: flex; align-items: center; gap: var(--s-4); padding: 8px var(--s-3);
      border-radius: var(--r-md); font: 400 14px/1.4 var(--font-ui); color: var(--ink-2);
      cursor: pointer; min-height: 38px; border: 0; background: transparent; width: 100%;
      text-align: left; transition: background .12s; }
    .fam-nav-item:hover { background: var(--bg-hover); color: var(--ink-1); }
    .fam-nav-item.is-active { background: var(--clay-tint); color: var(--clay); font-weight: 500; }
    .fam-nav-item .ic { width: 18px; height: 18px; stroke-width: 1.75; flex: 0 0 auto; opacity: .9; }
    .fam-nav-item .right { margin-left: auto; }
    .fam-pill { display: inline-flex; align-items: center; gap: 4px; font: 600 11px/1 var(--font-ui);
      padding: 3px 8px; border-radius: var(--r-pill); background: var(--bg-active);
      color: var(--ink-2); }
    .fam-pill.warn { background: rgba(184,135,50,.18); color: var(--warning); }
    .fam-pill.clay { background: var(--clay-tint); color: var(--clay); }
    .sidebar-foot { margin-top: auto; border-top: 1px solid var(--border-subtle);
      padding-top: var(--s-3); display: flex; flex-direction: column; gap: 2px; }
    .sidebar-user { display: flex; align-items: center; gap: var(--s-3);
      padding: var(--s-3); border-radius: var(--r-md); cursor: pointer; transition: background .12s; }
    .sidebar-user:hover { background: var(--bg-hover); }
    .sidebar-user .col { flex: 1; min-width: 0; }
    .sidebar-user .name { font: 600 13px/1.3 var(--font-ui); color: var(--ink-1);
      display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-user .meta { font: 400 11px/1.3 var(--font-ui); color: var(--ink-3); }
    .sidebar-user .ic { width: 14px; height: 14px; color: var(--ink-3); flex-shrink: 0; }
    .qa-scrim { position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center; padding: var(--s-5); z-index: 220; }
    .qa-panel { width: 460px; max-width: 96vw; max-height: 92vh; overflow-y: auto;
      background: var(--bg-raised); border-radius: var(--r-xl); box-shadow: var(--sh-lg);
      font-family: var(--font-ui); }
    .qa-head { padding: var(--s-6) var(--s-7) var(--s-3); display: flex;
      justify-content: space-between; align-items: flex-start; }
    .qa-head h3 { margin: 0 0 4px; font: 500 20px/1.3 var(--font-display); color: var(--ink-1); }
    .qa-head p { margin: 0; font: 400 13px/1.45 var(--font-ui); color: var(--ink-3); }
    .qa-body { padding: var(--s-4) var(--s-7) var(--s-7); display: flex; flex-direction: column; gap: var(--s-4); }
    .qa-tabs { display: flex; gap: 4px; background: var(--bg-sunken); padding: 4px;
      border-radius: 999px; }
    .qa-tab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      border: 0; cursor: pointer; border-radius: 999px; min-height: 38px;
      background: transparent; color: var(--ink-2); font: 500 13px/1 var(--font-ui);
      font-family: inherit; }
    .qa-tab.on { background: var(--bg-raised); color: var(--ink-1); box-shadow: var(--sh-xs); }
    .qa-tab .ic { width: 15px; height: 15px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font: 500 12px/1 var(--font-ui); color: var(--ink-2);
      text-transform: uppercase; letter-spacing: .05em; }
    .field input, .field select { border: 1px solid var(--border); border-radius: var(--r-md);
      padding: 10px 12px; font: 400 14px/1.3 var(--font-ui); background: var(--bg-raised);
      color: var(--ink-1); outline: none; font-family: inherit; }
    .field input:focus, .field select:focus { border-color: var(--clay); box-shadow: var(--ring); }
    .qa-foot { display: flex; justify-content: flex-end; gap: var(--s-3);
      padding: var(--s-4) var(--s-7); border-top: 1px solid var(--border-subtle);
      background: var(--bg-sunken); }
    .qa-btn-ghost { padding: 0 var(--s-4); min-height: 38px; border: 1px solid var(--border);
      background: transparent; border-radius: var(--r-md); cursor: pointer;
      font: 500 13px/1 var(--font-ui); color: var(--ink-1); font-family: inherit; }
    .qa-btn-ghost:hover { background: var(--bg-hover); }
    .qa-btn-primary { padding: 0 var(--s-5); min-height: 38px; border: 0;
      background: var(--clay); color: #fff; border-radius: var(--r-md); cursor: pointer;
      font: 600 13px/1 var(--font-ui); font-family: inherit; box-shadow: var(--sh-xs); }
    .qa-btn-primary:hover { background: var(--clay-2); }
    .qa-btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    /* ===== END SIDEBAR + NAV + QUICKADD ===== */
    /* ===== HOME / PROFILE (added) ===== */
    .fam-page-header { display: flex; align-items: flex-end; justify-content: space-between;
      gap: var(--s-5); flex-wrap: wrap; margin-bottom: var(--s-7); }
    .fam-page-header .titles { min-width: 0; }
    .fam-page-header .titles h1 { font: 400 32px/1.1 var(--font-display);
      color: var(--ink-1); margin: 0; }
    .fam-page-header .titles .meta { font: 400 14px/1.4 var(--font-ui);
      color: var(--ink-2); margin-top: 6px; }
    .fam-page-header .eyebrow { font: 600 11px/1.3 var(--font-ui);
      letter-spacing: 0.10em; text-transform: uppercase; color: var(--ink-3); margin: 0 0 6px; }
    .fam-page-header .actions { display: flex; gap: var(--s-3); flex-shrink: 0; }
    .fam-btn-secondary { display: inline-flex; align-items: center; gap: 6px;
      padding: 0 var(--s-4); min-height: 36px; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: var(--r-md); cursor: pointer;
      font: 500 13px/1 var(--font-ui); color: var(--ink-1); font-family: inherit; }
    .fam-btn-secondary:hover { background: var(--bg-hover); }
    .fam-btn-secondary[disabled] { opacity: .45; cursor: not-allowed; }
    .fam-btn-secondary .ic { width: 14px; height: 14px; }
    .fam-btn-primary-sm { display: inline-flex; align-items: center; gap: 6px;
      padding: 0 var(--s-4); min-height: 36px; background: var(--clay); color: #fff;
      border: 0; border-radius: var(--r-md); cursor: pointer;
      font: 600 13px/1 var(--font-ui); font-family: inherit; box-shadow: var(--sh-xs); }
    .fam-btn-primary-sm:hover { background: var(--clay-2); }
    .fam-btn-primary-sm .ic { width: 14px; height: 14px; }
    .profile-hero { background: var(--bg-surface); border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg); padding: var(--s-7); display: grid;
      grid-template-columns: 1fr auto; gap: var(--s-7); align-items: center; }
    .profile-hero .hero-id { display: flex; gap: var(--s-5); align-items: center; min-width: 0; }
    .profile-hero .hero-stats { display: grid;
      grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
      gap: var(--s-3); min-width: 240px; }
    @media (max-width: 760px) {
      .profile-hero { grid-template-columns: 1fr; padding: var(--s-5); }
      .profile-hero .hero-stats { min-width: 0; grid-template-columns: repeat(2, 1fr); }
    }
    .fam-color-pill { display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: var(--r-pill); font: 600 11px/1 var(--font-ui); }
    .fam-color-pill .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .h-section { font: 600 16px/1.3 var(--font-ui); color: var(--ink-1); margin: 0; }
    .caption { font: 400 13px/1.4 var(--font-ui); color: var(--ink-3); }
    .row-list { display: flex; flex-direction: column; }
    .row-list > * + * { border-top: 1px solid var(--border-subtle); }
    .row { display: flex; align-items: center; gap: var(--s-4);
      padding: var(--s-4) var(--s-5); min-width: 0; }
    .row .col { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
    .row .col .title { font: 500 14px/1.3 var(--font-ui); color: var(--ink-1);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row .col .meta { font: 400 12px/1.3 var(--font-ui); color: var(--ink-3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row .mono { font: 500 13px/1 var(--font-mono); color: var(--ink-2); flex-shrink: 0; }
    .fam-grid-2 { display: grid; gap: var(--s-5);
      grid-template-columns: repeat(2, minmax(0, 1fr)); align-items: start; }
    @media (max-width: 860px) { .fam-grid-2 { grid-template-columns: 1fr; } }
    /* ===== END HOME / PROFILE ===== */
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;background:#FAF8F5}
    #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#FAF8F5;z-index:9999}
    .fam-logo{font-size:56px;font-weight:900;color:#E8734A;letter-spacing:-3px;font-family:Georgia,serif}
    .fam-msg{font-size:14px;color:#8A8478;font-family:Georgia,serif;margin-top:8px}
  

/* ========================================================== */
/* fam-components.css — Foundation drop                       */
/* ========================================================== */
/* =========================================================
   Fam — Component styles
   ========================================================= */

* { box-sizing: border-box; }
html, body, #root { margin: 0; padding: 0; height: 100%; }
body {
  font: 400 15px/1.5 var(--font-ui);
  color: var(--ink-1);
  background: var(--bg-canvas);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
:focus-visible { outline: none; box-shadow: var(--ring); border-radius: var(--r-sm); }
a { color: inherit; text-decoration: none; }
button { font: inherit; }

/* ---------- Typography helpers ---------- */
.h-display { font: 400 34px/1.12 var(--font-display); letter-spacing: -0.01em; margin: 0; color: var(--ink-1); }
.h-title   { font: 500 24px/1.25 var(--font-display); letter-spacing: -0.005em; margin: 0; color: var(--ink-1); }
.h-section { font: 500 20px/1.3 var(--font-display); margin: 0; color: var(--ink-1); }
.h-sm      { font: 600 16px/1.35 var(--font-ui); margin: 0; color: var(--ink-1); letter-spacing: -0.005em;}
.subtle    { font: 400 15px/1.5 var(--font-ui); color: var(--ink-2); margin: 0; }
.eyebrow   { font: 600 11px/1.3 var(--font-ui); letter-spacing: 0.10em; text-transform: uppercase; color: var(--ink-3); margin: 0; }
.mono      { font: 400 13px/1.4 var(--font-mono); color: var(--ink-3); }
.caption   { font: 500 12px/1.4 var(--font-ui); color: var(--ink-3); }
.text-2    { color: var(--ink-2); }
.text-3    { color: var(--ink-3); }
.text-danger  { color: var(--danger); }
.text-warning { color: var(--warning); }
.text-success { color: var(--success); }
.text-clay    { color: var(--clay); }

/* ---------- Card ---------- */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-lg);
  padding: var(--s-7);
}
.card.flush { padding: 0; overflow: hidden; }
.card-head {
  padding: var(--s-5) var(--s-7);
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--s-4);
  flex-wrap: wrap;
}
.card-head > * { min-width: 0; }
.card-head .h-section { white-space: nowrap; }
.card-body { padding: var(--s-7); }
.card-foot { padding: var(--s-5) var(--s-7); border-top: 1px solid var(--border-subtle); }

/* ---------- Button ---------- */
.btn {
  --btn-bg: var(--bg-surface);
  --btn-fg: var(--ink-1);
  --btn-border: var(--border);
  --btn-hover-bg: var(--bg-hover);
  display: inline-flex; align-items: center; justify-content: center; gap: var(--s-3);
  font: 500 14px/1 var(--font-ui);
  letter-spacing: -0.005em;
  background: var(--btn-bg);
  color: var(--btn-fg);
  border: 1px solid var(--btn-border);
  border-radius: var(--r-md);
  padding: 0 var(--s-5);
  min-height: var(--hit);
  cursor: pointer;
  transition: background 120ms ease, transform 120ms ease, box-shadow 120ms ease;
  text-decoration: none;
  white-space: nowrap;
}
.btn:hover { background: var(--btn-hover-bg); }
.btn:active { transform: translateY(0.5px); }
.btn[disabled], .btn[aria-disabled="true"] { opacity: 0.45; pointer-events: none; }

.btn--primary {
  --btn-bg: var(--clay);
  --btn-fg: var(--ink-on-accent);
  --btn-border: transparent;
  --btn-hover-bg: var(--clay-2);
  box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, var(--sh-xs);
}
.btn--ghost {
  --btn-bg: transparent;
  --btn-border: transparent;
  --btn-hover-bg: var(--bg-hover);
}
.btn--danger {
  --btn-fg: var(--danger);
  --btn-border: color-mix(in oklab, var(--danger) 35%, var(--border));
  --btn-hover-bg: var(--danger-bg);
}
.btn--sm { min-height: 32px; padding: 0 var(--s-4); font-size: 13px; border-radius: var(--r-sm); }
.btn--lg { min-height: 52px; padding: 0 var(--s-7); font-size: 16px; border-radius: var(--r-lg); }
.btn--icon { width: var(--hit); padding: 0; }
.btn--icon.btn--sm { width: 32px; }

.btn .ic {
  width: 16px; height: 16px;
  stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
}

/* ---------- Input ---------- */
.input, .select, .textarea {
  width: 100%;
  background: var(--bg-sunken);
  color: var(--ink-1);
  font: 400 15px/1.5 var(--font-ui);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  padding: 0 var(--s-5);
  min-height: var(--hit);
  transition: border-color 120ms ease, background 120ms ease;
}
.input::placeholder { color: var(--ink-4); }
.input:hover, .select:hover, .textarea:hover { border-color: var(--border); }
.input:focus, .select:focus, .textarea:focus {
  outline: none; border-color: var(--clay); background: var(--bg-raised);
  box-shadow: var(--ring);
}
.select {
  appearance: none; -webkit-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none'><path d='M1 1.5 6 6.5l5-5' stroke='%238b8270' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat: no-repeat; background-position: right 14px center;
  padding-right: 36px;
}
.textarea { padding: var(--s-4) var(--s-5); min-height: 96px; line-height: 1.5; resize: vertical; }

.field { display: flex; flex-direction: column; gap: var(--s-2); }
.field-label { font: 500 13px/1.4 var(--font-ui); color: var(--ink-2); }
.field-hint  { font: 500 12px/1.4 var(--font-ui); color: var(--ink-3); }

.input-search {
  display: flex; align-items: center; gap: var(--s-3);
  background: var(--bg-sunken);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  padding: 0 var(--s-4);
  min-height: var(--hit);
}
.input-search input {
  flex: 1; border: 0; background: transparent; color: var(--ink-1);
  font: 400 15px/1 var(--font-ui); padding: 0;
}
.input-search input:focus { outline: none; }
.input-search .ic { color: var(--ink-3); width: 16px; height: 16px; }
.kbd {
  font: 400 11px/1 var(--font-mono);
  padding: 4px 7px; border-radius: var(--r-sm);
  background: var(--bg-raised); border: 1px solid var(--border-subtle);
  color: var(--ink-3); flex: 0 0 auto;
}

/* ---------- Toggle ---------- */
.toggle {
  display: inline-flex; align-items: center; gap: var(--s-4);
  font: 400 15px/1.5 var(--font-ui); color: var(--ink-1); cursor: pointer; position: relative;
}
.toggle input { position: absolute; opacity: 0; inset: 0; }
.toggle .track {
  width: 36px; height: 22px; border-radius: var(--r-pill);
  background: var(--bg-active); border: 1px solid var(--border-subtle);
  position: relative; transition: background 160ms ease;
  flex: 0 0 auto;
}
.toggle .track::after {
  content: ""; position: absolute; top: 2px; left: 2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--bg-raised); box-shadow: var(--sh-xs);
  transition: transform 160ms ease;
}
.toggle input:checked + .track { background: var(--clay); border-color: transparent; }
.toggle input:checked + .track::after { transform: translateX(14px); }

/* ---------- Checkbox ---------- */
.check {
  width: 20px; height: 20px; border-radius: var(--r-xs);
  border: 1.5px solid var(--border-strong);
  display: inline-grid; place-items: center;
  background: var(--bg-surface); cursor: pointer;
  flex: 0 0 auto;
  transition: background 120ms ease, border-color 120ms ease;
}
.check:hover { border-color: var(--clay); }
.check[aria-checked="true"] {
  background: var(--clay); border-color: var(--clay);
}
.check[aria-checked="true"]::after {
  content: ""; width: 10px; height: 6px;
  border-left: 2px solid var(--ink-on-accent);
  border-bottom: 2px solid var(--ink-on-accent);
  transform: rotate(-45deg) translate(1px, -1px);
}

/* ---------- Avatar ---------- */
.avatar {
  --av-size: 32px;
  width: var(--av-size); height: var(--av-size);
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font: 500 13px/1 var(--font-ui);
  background: var(--clay-tint);
  flex: 0 0 auto;
  border: 1px solid color-mix(in oklab, var(--clay) 25%, transparent);
  color: var(--clay);
}
.avatar.xs { --av-size: 22px; font-size: 11px; }
.avatar.sm { --av-size: 28px; font-size: 12px; }
.avatar.md { --av-size: 36px; font-size: 14px; }
.avatar.lg { --av-size: 48px; font-size: 18px; }
.avatar.xl { --av-size: 80px; font-size: 30px; font-weight: 500; font-family: var(--font-display); }

.av-clay  { background: var(--clay-tint);  color: var(--clay);  border-color: color-mix(in oklab, var(--clay) 25%, transparent); }
.av-sage  { background: var(--sage-tint);  color: var(--sage);  border-color: color-mix(in oklab, var(--sage) 25%, transparent); }
.av-sky   { background: var(--sky-tint);   color: var(--sky);   border-color: color-mix(in oklab, var(--sky)  25%, transparent); }
.av-rose  { background: var(--rose-tint);  color: var(--rose);  border-color: color-mix(in oklab, var(--rose) 25%, transparent); }
.av-amber { background: var(--amber-tint); color: var(--amber); border-color: color-mix(in oklab, var(--amber) 25%, transparent); }
.av-plum  { background: var(--plum-tint);  color: var(--plum);  border-color: color-mix(in oklab, var(--plum) 25%, transparent); }

.avatar-stack { display: inline-flex; }
.avatar-stack .avatar { margin-left: -8px; box-shadow: 0 0 0 2px var(--bg-surface); }
.avatar-stack .avatar:first-child { margin-left: 0; }

/* ---------- Pills ---------- */
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  font: 500 12px/1.4 var(--font-ui);
  padding: 3px 9px;
  border-radius: var(--r-pill);
  background: var(--bg-sunken);
  color: var(--ink-2);
  border: 1px solid var(--border-subtle);
  white-space: nowrap;
}
.pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.pill--clay    { color: var(--clay);    background: var(--clay-tint);   border-color: transparent; }
.pill--sage    { color: var(--sage);    background: var(--sage-tint);   border-color: transparent; }
.pill--sky     { color: var(--sky);     background: var(--sky-tint);    border-color: transparent; }
.pill--rose    { color: var(--rose);    background: var(--rose-tint);   border-color: transparent; }
.pill--amber   { color: var(--amber);   background: var(--amber-tint);  border-color: transparent; }
.pill--plum    { color: var(--plum);    background: var(--plum-tint);   border-color: transparent; }
.pill--danger  { color: var(--danger);  background: var(--danger-bg);   border-color: transparent; }
.pill--warning { color: var(--warning); background: var(--warning-bg);  border-color: transparent; }
.pill--success { color: var(--success); background: var(--success-bg);  border-color: transparent; }
.pill--info    { color: var(--info);    background: var(--info-bg);     border-color: transparent; }

.count {
  font: 600 11px/1 var(--font-ui);
  min-width: 18px; height: 18px; padding: 0 5px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--clay); color: var(--ink-on-accent);
  border-radius: var(--r-pill);
}

/* ---------- Digest banner ---------- */
.digest {
  display: flex; align-items: center; gap: var(--s-4);
  padding: var(--s-4) var(--s-5);
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  position: relative;
  text-align: left;
  width: 100%;
  cursor: pointer;
  color: var(--ink-1);
}
.digest:hover { background: var(--bg-hover); }
.digest::before {
  content: ""; position: absolute; left: 0; top: 10px; bottom: 10px;
  width: 3px; border-radius: 3px; background: var(--ink-3);
}
.digest.is-danger::before { background: var(--danger); }
.digest.is-info::before { background: var(--info); }
.digest.is-success::before { background: var(--success); }
.digest .glyph {
  width: 32px; height: 32px; border-radius: var(--r-sm);
  display: grid; place-items: center;
  background: var(--bg-sunken);
  color: var(--ink-2);
  flex: 0 0 auto;
}
.digest.is-danger .glyph { background: var(--danger-bg); color: var(--danger); }
.digest.is-info .glyph { background: var(--info-bg); color: var(--info); }
.digest.is-success .glyph { background: var(--success-bg); color: var(--success); }
.digest .body { flex: 1; min-width: 0; font: 400 15px/1.4 var(--font-ui); color: var(--ink-1); }
.digest .body em { color: var(--ink-2); font-style: normal; font-weight: 400; }
.digest .arrow { color: var(--ink-3); flex: 0 0 auto; }

/* ---------- Modal ---------- */
.modal-scrim {
  position: fixed; inset: 0; background: var(--bg-scrim);
  display: grid; place-items: end center;
  z-index: 50;
  animation: scrim-in 160ms ease-out;
}
@media (min-width: 720px) { .modal-scrim { place-items: center; } }
@keyframes scrim-in { from {opacity:0} to {opacity:1} }
.modal-panel {
  width: min(440px, 100%);
  background: var(--bg-raised);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  box-shadow: var(--sh-lg);
  overflow: hidden;
  animation: panel-up 240ms cubic-bezier(.2,.7,.2,1);
}
@media (min-width: 720px) {
  .modal-panel { border-radius: var(--r-xl); margin: var(--s-9); }
}
@keyframes panel-up { from {transform: translateY(40px); opacity: 0} to {transform: none; opacity: 1} }
.modal-head { padding: var(--s-6) var(--s-7) var(--s-3); }
.modal-head h3 { font: 500 20px/1.3 var(--font-display); margin: 0 0 4px; }
.modal-head p { font: 400 13px/1.45 var(--font-ui); color: var(--ink-3); margin: 0; }
.modal-body { padding: var(--s-5) var(--s-7) var(--s-7); display: flex; flex-direction: column; gap: var(--s-5); }
.modal-foot {
  padding: var(--s-5) var(--s-7);
  border-top: 1px solid var(--border-subtle);
  display: flex; justify-content: flex-end; gap: var(--s-3);
  background: color-mix(in oklab, var(--bg-canvas) 50%, var(--bg-raised));
}

/* ---------- App Shell ---------- */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
  background: var(--bg-canvas);
}
.sidebar {
  border-right: 1px solid var(--border-subtle);
  padding: var(--s-5) var(--s-4);
  display: flex; flex-direction: column; gap: var(--s-5);
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto;
}
.sidebar-brand {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: var(--s-2) var(--s-3) var(--s-2);
}
.sidebar-brand .word { font: 500 26px/1 var(--font-display); color: var(--clay); letter-spacing: -0.01em; }
.sidebar-brand .fam-name { font: 500 12px/1 var(--font-ui); color: var(--ink-3); }

.nav-group { display: flex; flex-direction: column; gap: 1px; }
.nav-section {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--s-5) var(--s-3) var(--s-2);
}
.nav-section .label { font: 600 11px/1.3 var(--font-ui); letter-spacing: 0.10em; text-transform: uppercase; color: var(--ink-3); }
.nav-section button {
  background: none; border: 0; color: var(--ink-3); cursor: pointer; padding: 4px;
  border-radius: var(--r-sm);
}
.nav-section button:hover { background: var(--bg-hover); color: var(--ink-1); }

.nav-item {
  display: flex; align-items: center; gap: var(--s-4);
  padding: 8px var(--s-3);
  border-radius: var(--r-md);
  font: 400 14px/1.4 var(--font-ui); color: var(--ink-2);
  cursor: pointer; min-height: 38px;
  border: 0; background: transparent; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--bg-hover); color: var(--ink-1); }
.nav-item.is-active {
  background: var(--clay-tint);
  color: var(--clay);
  font-weight: 500;
}
.nav-item .ic { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; flex: 0 0 auto; }
.nav-item .right { margin-left: auto; }

.sidebar-foot {
  margin-top: auto;
  border-top: 1px solid var(--border-subtle);
  padding-top: var(--s-4);
  display: flex; flex-direction: column; gap: var(--s-2);
}
.theme-seg {
  display: flex; gap: 2px; background: var(--bg-sunken);
  border: 1px solid var(--border-subtle); border-radius: var(--r-pill);
  padding: 3px; margin-bottom: var(--s-2);
}
.theme-seg button {
  flex: 1; display: inline-flex; align-items: center; justify-content: center;
  min-height: 30px; border: 0; background: transparent; cursor: pointer;
  border-radius: var(--r-pill); color: var(--ink-3);
}
.theme-seg button:hover { color: var(--ink-1); }
.theme-seg button.on { background: var(--bg-raised); color: var(--clay); box-shadow: var(--sh-xs); }
.theme-seg .ic { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
.sidebar-user {
  display: flex; align-items: center; gap: var(--s-3);
  padding: var(--s-3);
  border-radius: var(--r-md);
  cursor: pointer;
}
.sidebar-user:hover { background: var(--bg-hover); }
.sidebar-user .col { display: flex; flex-direction: column; line-height: 1.2; gap: 2px; min-width: 0; }
.sidebar-user .name { font: 500 13px/1.2 var(--font-ui); color: var(--ink-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-user .meta { font: 500 11px/1 var(--font-ui); color: var(--ink-3); }
.sidebar-user .gear { margin-left: auto; color: var(--ink-3); }

.main {
  min-width: 0;
  display: flex; flex-direction: column;
}
.main-pad {
  padding: var(--s-8) var(--s-9);
  max-width: 1100px; width: 100%; margin: 0 auto;
}

/* Mobile: collapse sidebar */
.mobile-topbar {
  display: none;
  align-items: center; justify-content: space-between;
  padding: var(--s-3) var(--s-5);
  border-bottom: 1px solid var(--border-subtle);
  background: color-mix(in oklab, var(--bg-canvas) 90%, transparent);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 30; height: var(--topbar-h);
}
.mobile-topbar .word { font: 500 22px/1 var(--font-display); color: var(--clay); }

.mobile-tabbar {
  display: none;
  position: sticky; bottom: 0; z-index: 30;
  background: color-mix(in oklab, var(--bg-canvas) 90%, transparent);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border-subtle);
  padding: 6px var(--s-3) max(6px, env(safe-area-inset-bottom));
  gap: var(--s-2);
  justify-content: space-around;
}
.mobile-tabbar .tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 6px 0; border: 0; background: none; color: var(--ink-3);
  font: 500 10px/1.2 var(--font-ui);
  letter-spacing: 0.02em;
  cursor: pointer; min-height: 48px;
}
.mobile-tabbar .tab.is-active { color: var(--clay); }
.mobile-tabbar .tab .ic { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }

@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .mobile-topbar { display: flex; }
  .mobile-tabbar { display: flex; }
  .main-pad { padding: var(--s-5) var(--s-5) var(--s-7); }
}

/* ---------- Page header (inside main) ---------- */
.page-header {
  display: flex; align-items: end; justify-content: space-between;
  gap: var(--s-5); flex-wrap: wrap;
  margin-bottom: var(--s-8);
}
.page-header .titles h1 { font: 400 32px/1.1 var(--font-display); margin: 0; letter-spacing: -0.01em; }
.page-header .titles .meta { font: 400 14px/1.4 var(--font-ui); color: var(--ink-2); margin-top: 6px; }
.page-header .actions { display: flex; align-items: center; gap: var(--s-3); }

@media (max-width: 720px) {
  .page-header .titles h1 { font-size: 26px; }
}

/* ---------- Section header (within a page) ---------- */
.sec-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin: var(--s-9) 0 var(--s-4);
  gap: var(--s-4);
}
.sec-head:first-child { margin-top: 0; }
.sec-head h2 { font: 500 20px/1.3 var(--font-display); margin: 0; letter-spacing: -0.005em; }
.sec-head .right { display: flex; align-items: center; gap: var(--s-3); font: 500 13px/1 var(--font-ui); color: var(--ink-3); }
.sec-head .right a { color: var(--clay); }
.sec-head .right a:hover { text-decoration: underline; }

/* ---------- List row generic ---------- */
.row-list { display: flex; flex-direction: column; }
.row-list > * + * { border-top: 1px solid var(--border-subtle); }
.row {
  display: flex; align-items: center; gap: var(--s-4);
  padding: var(--s-4) var(--s-5);
  min-height: 56px;
}
.row:hover { background: var(--bg-hover); }
.row .col { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
.row .title { font: 500 15px/1.3 var(--font-ui); color: var(--ink-1); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
.row .meta { font: 400 12px/1.3 var(--font-ui); color: var(--ink-3); }

/* ---------- Utilities ---------- */
.stack { display: flex; flex-direction: column; }
.stack-1 > * + * { margin-top: var(--s-1); }
.stack-2 > * + * { margin-top: var(--s-2); }
.stack-3 > * + * { margin-top: var(--s-3); }
.stack-4 > * + * { margin-top: var(--s-4); }
.stack-5 > * + * { margin-top: var(--s-5); }
.stack-6 > * + * { margin-top: var(--s-6); }
.stack-7 > * + * { margin-top: var(--s-7); }

.hstack { display: flex; align-items: center; gap: var(--s-3); }
.hstack-4 { gap: var(--s-4); }
.hstack-5 { gap: var(--s-5); }
.spacer { flex: 1; }

.grid { display: grid; gap: var(--s-5); }
.grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
@media (max-width: 860px) {
  .grid-3, .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 540px) {
  .grid-2 { grid-template-columns: 1fr; }
}

.divider { height: 1px; background: var(--border-subtle); margin: var(--s-5) 0; border: 0; }

/* Calendar-specific small chips */
.event-chip {
  border-radius: var(--r-sm);
  padding: 4px 8px 5px;
  font: 500 12px/1.2 var(--font-ui);
  border-left: 3px solid var(--clay);
  background: var(--clay-tint);
  color: var(--clay);
  display: flex; flex-direction: column; gap: 1px;
  overflow: hidden;
  cursor: pointer;
}
.event-chip .time { font: 500 10px/1 var(--font-mono); opacity: 0.8; }
.event-chip.ec-sage  { background: var(--sage-tint);  color: var(--sage);  border-color: var(--sage); }
.event-chip.ec-sky   { background: var(--sky-tint);   color: var(--sky);   border-color: var(--sky); }
.event-chip.ec-rose  { background: var(--rose-tint);  color: var(--rose);  border-color: var(--rose); }
.event-chip.ec-amber { background: var(--amber-tint); color: var(--amber); border-color: var(--amber); }
.event-chip.ec-plum  { background: var(--plum-tint);  color: var(--plum);  border-color: var(--plum); }

/* "About this design" annotation block */
.notes {
  margin-top: var(--s-9);
  border-top: 1px dashed var(--border);
  padding-top: var(--s-7);
}
.notes h3 { font: 600 11px/1.3 var(--font-ui); letter-spacing: 0.10em; text-transform: uppercase; color: var(--ink-3); margin: 0 0 var(--s-4); }
.notes ul { margin: 0; padding-left: var(--s-5); display: flex; flex-direction: column; gap: var(--s-3); }
.notes li { font: 400 14px/1.55 var(--font-ui); color: var(--ink-2); }
.notes li b { color: var(--ink-1); font-weight: 500; }
.notes li code { font: 400 12px/1 var(--font-mono); background: var(--bg-sunken); padding: 2px 5px; border-radius: 4px; color: var(--ink-2); }


/* === Tasks: urgency board (desktop) + grouped list (mobile) === */
.tasks-board{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;align-items:start}
.t-col{background:var(--bg-sunken);border:1px solid var(--border-subtle);border-radius:var(--r-lg);padding:10px;display:flex;flex-direction:column;gap:8px}
.t-colhead{display:flex;align-items:center;gap:8px;padding:2px 4px 4px}
.t-card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--r-md);padding:10px 12px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:background 120ms ease}
.t-card:hover{background:var(--bg-hover)}
.t-title{font:500 13px/1.35 var(--font-ui);color:var(--ink-1)}
.t-foot{display:flex;align-items:center;justify-content:space-between;padding-left:30px}
.tasks-list{display:none}
@media (max-width: 900px){.tasks-board{display:none}.tasks-list{display:block}}
/* === Home dashboard layout === */
.home-c-grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(0,1fr);gap:var(--s-5);align-items:start}
@media (max-width: 960px){.home-c-grid{grid-template-columns:1fr}}

/* === State kit === */
.st-empty{text-align:center;padding:var(--s-10) var(--s-7);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--r-lg)}
.st-empty.bare{background:transparent;border:0;padding:var(--s-7) var(--s-5)}
.st-empty.compact{padding:var(--s-7) var(--s-5)}
.st-empty .st-ic{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;margin:0 auto var(--s-5)}
.st-empty.compact .st-ic{width:44px;height:44px;margin-bottom:var(--s-4)}
.st-empty .st-title{margin:0 0 6px}
.st-empty .st-body{max-width:42ch;margin:0 auto}
.st-empty .st-action{margin-top:var(--s-6);display:flex;justify-content:center;gap:var(--s-3);flex-wrap:wrap}
.st-empty.compact .st-action{margin-top:var(--s-4)}
.st-skel{display:block;background:linear-gradient(90deg,var(--bg-sunken) 25%,var(--bg-hover) 50%,var(--bg-sunken) 75%);background-size:200% 100%;animation:st-shimmer 1.3s linear infinite}
@keyframes st-shimmer{to{background-position:-200% 0}}
@media (prefers-reduced-motion: reduce){.st-skel{animation:none}}
.st-skel-list{display:flex;flex-direction:column}
.st-skel-row{display:flex;align-items:center;gap:var(--s-4);padding:var(--s-4) var(--s-3)}
.st-skel-list .st-skel-row+.st-skel-row{border-top:1px solid var(--border-subtle)}
.st-skel-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px}
.st-skel-cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--s-5)}
.st-skel-card{display:flex;flex-direction:column;gap:9px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--r-lg);padding:var(--s-5)}
@media (max-width: 640px){.st-skel-cards{grid-template-columns:1fr}}
.offline-bar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:var(--s-3);padding:9px var(--s-6);font:500 13px/1.35 var(--font-ui);border-bottom:1px solid transparent}
.offline-bar em{font-style:normal;font-weight:400;opacity:0.85}
.offline-bar.is-offline{background:var(--warning-bg);color:var(--warning);border-bottom-color:color-mix(in oklab,var(--warning) 28%,transparent)}
.offline-bar.is-syncing{background:var(--info-bg);color:var(--info);border-bottom-color:color-mix(in oklab,var(--info) 28%,transparent)}
.offline-bar .ob-glyph{display:inline-flex;align-items:center;flex:0 0 auto}
.offline-bar .ob-glyph.spin{animation:st-spin 0.9s linear infinite}
@keyframes st-spin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion: reduce){.offline-bar .ob-glyph.spin{animation:none}}
.offline-bar .ob-dot{width:9px;height:9px;border-radius:50%;background:currentColor;display:inline-block;animation:st-pulse 1.4s ease-in-out infinite}
@keyframes st-pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.offline-bar .ob-text{min-width:0}
.offline-bar .ob-badge{margin-left:auto;flex:0 0 auto;font:600 11px/1 var(--font-mono);padding:5px 9px;border-radius:var(--r-pill);background:color-mix(in oklab,currentColor 16%,transparent);color:inherit;white-space:nowrap}
</style>
